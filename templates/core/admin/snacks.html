{% extends 'core/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3 animate-fade-up stagger-1">
  <div class="col">
    <h4 class="fw-bold mb-0" style="color:#1a1a2e">
      <i class="bi bi-bag-fill" style="color:#FF5200"></i> Snack Management
    </h4>
    <p class="text-muted mb-0 mt-1">Add, edit and manage snack items</p>
  </div>
  <button class="k-btn k-btn-primary" onclick="showAddForm()">
    <i class="bi bi-plus-lg"></i> Add Snack
  </button>
</div>

<div id="add-form" class="d-none mb-4 animate-fade-up">
  <div class="k-card p-4">
    <div style="font-weight:700;font-size:1.1rem;color:var(--dark);margin-bottom:16px;" id="form-title">Add New Snack
    </div>
    <input type="hidden" id="edit-id">
    <div class="row g-3">
      <div class="col-md-6">
        <label class="k-label">Snack Name</label>
        <input type="text" id="snack-name" class="k-input" placeholder="e.g. Cutlet">
      </div>
      <div class="col-md-6">
        <label class="k-label">Price (₹)</label>
        <input type="number" id="snack-price" class="k-input" placeholder="e.g. 25">
      </div>
      <div class="col-md-6">
        <label class="k-label">Status</label>
        <select id="snack-status" class="k-select">
          <option value="true">Active</option>
          <option value="false">Inactive</option>
        </select>
      </div>
      <div class="col-md-6">
        <label class="k-label">Snack Image</label>
        <input type="file" id="snack-image" class="k-input" accept="image/*">
        <div id="image-preview" class="mt-2 d-none">
          <img id="preview-img" src="" alt="preview"
            style="width:70px;height:70px;object-fit:cover;border-radius:14px;">
        </div>
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="k-btn k-btn-primary" onclick="saveSnack()">
          <i class="bi bi-check-lg"></i> Save
        </button>
        <button class="k-btn k-btn-light" onclick="hideAddForm()">
          Cancel
        </button>
      </div>
    </div>
    <div id="form-error" class="mt-3 d-none" style="background:#fff0f3;color:var(--accent);border-radius:10px;
      padding:10px 14px;font-size:0.875rem;"></div>
    <div id="form-success" class="mt-3 d-none" style="background:#e6faf3;color:#1a9e6e;border-radius:10px;
      padding:10px 14px;font-size:0.875rem;"></div>
  </div>
</div>

<div class="k-card animate-fade-up stagger-3">
  <div class="k-card-header">
    <i class="bi bi-bag-fill"></i> All Snacks
  </div>
  <div id="snacks-list"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Check if user is admin
  if (localStorage.getItem('user_role') !== 'admin') {
    window.location.href = '/dashboard/';
  }
  async function loadSnacks() {
    const res = await fetch(API + '/snacks/', {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    });
    if (res.status === 401) { window.location.href = '/login/'; return; }
    const snacks = await res.json();
    renderSnacks(snacks);
  }

  function renderSnacks(snacks) {
    const list = document.getElementById('snacks-list');

    if (snacks.length === 0) {
      list.innerHTML = `
        <div class="text-center py-5" style="color:var(--text-muted);">
          <i class="bi bi-bag" style="font-size:2.5rem;"></i>
          <p class="mt-3 mb-0">No snacks found</p>
        </div>`;
      return;
    }

    list.innerHTML = snacks.map((s, i) => `
      <div class="k-list-item animate-fade-up"
        style="animation-delay:${i * 0.05}s;opacity:0;">
        <div class="d-flex align-items-center gap-3">

          <div style="width:52px;height:52px;border-radius:14px;overflow:hidden;
            background:var(--primary-light);display:flex;align-items:center;
            justify-content:center;flex-shrink:0;">
            ${s.image_url
        ? `<img src="${s.image_url}" alt="${s.name}"
                  style="width:100%;height:100%;object-fit:cover;">`
        : `<span style="font-size:1.5rem;">🍱</span>`
      }
          </div>

          <div style="flex:1;min-width:0;">
            <div style="font-weight:600;color:var(--dark);
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
              ${s.name}
            </div>
            <div style="font-size:0.82rem;color:var(--text-muted);">₹${s.price}</div>
            <span class="k-badge mt-1 ${s.is_active ? 'k-badge-green' : 'k-badge-red'}">
              ${s.is_active ? 'Active' : 'Inactive'}
            </span>
          </div>

          <div class="d-flex flex-column gap-2" style="flex-shrink:0;">
            <button class="k-btn k-btn-light"
              style="padding:6px 14px;font-size:0.8rem;white-space:nowrap;"
              onclick="editSnack(${s.id}, '${s.name.replace(/'/g, "\\'")}', ${s.price}, ${s.is_active}, '${s.image_url || ''}')">
              <i class="bi bi-pencil-fill"></i> Edit
            </button>
            <button class="k-btn ${s.is_active ? 'k-btn-danger' : 'k-btn-light'}"
              style="padding:6px 14px;font-size:0.8rem;white-space:nowrap;"
              onclick="toggleSnack(${s.id}, ${s.is_active})">
              <i class="bi bi-${s.is_active ? 'eye-slash' : 'eye'}"></i>
              ${s.is_active ? 'Hide' : 'Show'}
            </button>
          </div>

        </div>
      </div>
    `).join('');
  }

  function editSnack(id, name, price, isActive, imageUrl) {
    document.getElementById('form-title').textContent = 'Edit Snack';
    document.getElementById('edit-id').value = id;
    document.getElementById('snack-name').value = name;
    document.getElementById('snack-price').value = price;
    document.getElementById('snack-status').value = isActive.toString();
    // Show existing image preview
    if (imageUrl) {
      document.getElementById('preview-img').src = imageUrl;
      document.getElementById('image-preview').classList.remove('d-none');
    } else {
      document.getElementById('image-preview').classList.add('d-none');
    }
    document.getElementById('add-form').classList.remove('d-none');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function saveSnack() {
    const id = document.getElementById('edit-id').value;
    const name = document.getElementById('snack-name').value;
    const price = document.getElementById('snack-price').value;
    const status = document.getElementById('snack-status').value;
    const image = document.getElementById('snack-image').files[0];

    if (!name || !price) {
      showFormError('Please fill in all fields');
      return;
    }

    const formData = new FormData();
    formData.append('name', name);
    formData.append('price', price);
    formData.append('is_active', status);
    if (image) formData.append('image', image);

    const method = id ? 'PATCH' : 'POST';
    const url = id ? API + '/snacks/' + id + '/' : API + '/snacks/';

    const res = await fetch(url, {
      method: method,
      headers: { 'Authorization': 'Bearer ' + getToken() },
      body: formData
    });

    if (res.ok) {
      const successEl = document.getElementById('form-success');
      successEl.textContent = id ? 'Snack updated!' : 'Snack added!';
      successEl.classList.remove('d-none');
      document.getElementById('form-error').classList.add('d-none');
      document.getElementById('edit-id').value = '';
      document.getElementById('snack-name').value = '';
      document.getElementById('snack-price').value = '';
      document.getElementById('snack-image').value = '';
      document.getElementById('image-preview').classList.add('d-none');
      document.getElementById('form-title').textContent = 'Add New Snack';
      loadSnacks();
    } else {
      const text = await res.text();

      let errText;

      try {
        errText = JSON.stringify(JSON.parse(text));
      } catch (e) {
        errText = text;
      }

      console.log(errText);
      showFormError(errText);
    }
  }

  async function toggleSnack(id, isActive) {
    const res = await fetch(API + '/snacks/' + id + '/', {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getToken()
      },
      body: JSON.stringify({ is_active: !isActive })
    });
    if (res.ok) loadSnacks();
  }

  function showAddForm() {
    document.getElementById('form-title').textContent = 'Add New Snack';
    document.getElementById('edit-id').value = '';
    document.getElementById('snack-name').value = '';
    document.getElementById('snack-price').value = '';
    document.getElementById('snack-image').value = '';
    document.getElementById('image-preview').classList.add('d-none');
    document.getElementById('form-error').classList.add('d-none');    // ← add
    document.getElementById('form-success').classList.add('d-none');  // ← add
    document.getElementById('add-form').classList.remove('d-none');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function hideAddForm() {
    document.getElementById('add-form').classList.add('d-none');
    document.getElementById('form-error').classList.add('d-none');
    document.getElementById('form-success').classList.add('d-none');
  }

  function showFormError(msg) {
    const el = document.getElementById('form-error');
    el.textContent = msg;
    el.classList.remove('d-none');
  }

  document.getElementById('snack-image').addEventListener('change', function () {
    const file = this.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = function (e) {
        document.getElementById('preview-img').src = e.target.result;
        document.getElementById('image-preview').classList.remove('d-none');
      };
      reader.readAsDataURL(file);
    }
  });

  loadSnacks();
</script>
{% endblock %}
