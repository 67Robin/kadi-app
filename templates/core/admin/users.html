{% extends 'core/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3 animate-fade-up stagger-1">
  <div class="col">
    <h4 class="fw-bold mb-0" style="color:#1a1a2e">
      <i class="bi bi-people-fill" style="color:#FF5200"></i> User Management
    </h4>
    <p class="text-muted mb-0 mt-1">Manage your team members</p>
  </div>
  <button class="k-btn k-btn-primary" onclick="showAddForm()">
    <i class="bi bi-person-plus-fill"></i> Add User
  </button>
</div>

<div id="add-form" class="d-none mb-4 animate-fade-up">
  <div class="k-card p-4">
    <div style="font-weight:700;font-size:1.1rem;color:var(--dark);margin-bottom:16px;"
      id="form-title">Add New User</div>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="k-label">Full Name</label>
        <input type="text" id="new-name" class="k-input" placeholder="Enter full name">
      </div>
      <div class="col-md-6">
        <label class="k-label">Email Address</label>
        <input type="email" id="new-email" class="k-input" placeholder="Enter email">
      </div>
      <div class="col-md-6">
        <label class="k-label">Password</label>
        <input type="password" id="new-password" class="k-input"
          placeholder="Set password">
      </div>
      <div class="col-md-6">
        <label class="k-label">Role</label>
        <select id="new-role" class="k-select">
          <option value="user">Normal User</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="col-12 d-flex gap-2">
        <button class="k-btn k-btn-primary" onclick="createUser()">
          <i class="bi bi-check-lg"></i> Save User
        </button>
        <button class="k-btn k-btn-light" onclick="hideAddForm()">
          Cancel
        </button>
      </div>
    </div>
    <div id="form-error" class="mt-3 d-none"
      style="background:#fff0f3;color:var(--accent);border-radius:10px;
      padding:10px 14px;font-size:0.875rem;"></div>
    <div id="form-success" class="mt-3 d-none"
      style="background:#e6faf3;color:#1a9e6e;border-radius:10px;
      padding:10px 14px;font-size:0.875rem;"></div>
  </div>
</div>

<div class="k-card animate-fade-up stagger-3">
  <div class="k-card-header">
    <i class="bi bi-people-fill"></i> All Users
  </div>
  <div id="users-list"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Check if user is admin
  if (localStorage.getItem('user_role') !== 'admin') {
    window.location.href = '/dashboard/';
  }
  async function loadUsers() {
    const res = await fetch(API + '/users/', {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    });
    if (res.status === 401) { window.location.href = '/login/'; return; }
    if (res.status === 403) { window.location.href = '/dashboard/'; return; }
    const users = await res.json();
    renderUsers(users);
  }

  function renderUsers(users) {
    const list = document.getElementById('users-list');

    if (users.length === 0) {
      list.innerHTML = `
        <div class="text-center py-5" style="color:var(--text-muted);">
          <i class="bi bi-people" style="font-size:2.5rem;"></i>
          <p class="mt-3 mb-0">No users found</p>
        </div>`;
      return;
    }

    list.innerHTML = users.map((u, i) => `
      <div class="k-list-item animate-fade-up"
        style="animation-delay:${i*0.05}s;opacity:0;">
        <div class="d-flex align-items-center justify-content-between flex-wrap gap-2">
          <div class="d-flex align-items-center gap-3">
            <div class="k-avatar">
              ${u.name.charAt(0).toUpperCase()}
            </div>
            <div>
              <div style="font-weight:600;color:var(--dark);">${u.name}</div>
              <div style="font-size:0.82rem;color:var(--text-muted);">${u.email}</div>
              <div class="d-flex gap-2 mt-1">
                <span class="k-badge ${u.role === 'admin' ? 'k-badge-purple' : 'k-badge-blue'}">
                  ${u.role === 'admin' ? 'Admin' : 'User'}
                </span>
                <span class="k-badge ${u.is_active ? 'k-badge-green' : 'k-badge-red'}">
                  ${u.is_active ? 'Active' : 'Disabled'}
                </span>
              </div>
            </div>
          </div>
          <button class="k-btn ${u.is_active ? 'k-btn-danger' : 'k-btn-light'}"
            style="padding:7px 16px;font-size:0.82rem;"
            onclick="toggleUser(${u.id}, ${u.is_active})">
            <i class="bi bi-${u.is_active ? 'person-slash' : 'person-check'}"></i>
            ${u.is_active ? 'Disable' : 'Enable'}
          </button>
        </div>
      </div>
    `).join('');
  }

  async function createUser() {
    const name     = document.getElementById('new-name').value;
    const email    = document.getElementById('new-email').value;
    const password = document.getElementById('new-password').value;
    const role     = document.getElementById('new-role').value;

    if (!name || !email || !password) {
      showFormError('Please fill in all fields');
      return;
    }

    const res = await fetch(API + '/users/create/', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + getToken()
      },
      body: JSON.stringify({ name, email, password, role })
    });

    if (res.ok) {
      document.getElementById('form-success').textContent = 'User created successfully!';
      document.getElementById('form-success').classList.remove('d-none');
      document.getElementById('form-error').classList.add('d-none');
      document.getElementById('new-name').value     = '';
      document.getElementById('new-email').value    = '';
      document.getElementById('new-password').value = '';
      loadUsers();
    } else {
      const err = await res.json();
      showFormError(JSON.stringify(err));
    }
  }

  async function toggleUser(id, isActive) {
    const res = await fetch(API + '/users/' + id + '/toggle/', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + getToken() }
    });
    if (res.ok) loadUsers();
  }

  function showAddForm() {
    document.getElementById('add-form').classList.remove('d-none');
  }

  function hideAddForm() {
    document.getElementById('add-form').classList.add('d-none');
  }

  function showFormError(msg) {
    const el = document.getElementById('form-error');
    el.textContent = msg;
    el.classList.remove('d-none');
  }

  loadUsers();
</script>
{% endblock %}
