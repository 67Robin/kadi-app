{% extends 'core/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3 animate-fade-up stagger-60">
  <div class="col">
    <h4 class="fw-bold mb-0" style="color:#1a1a2e">
      <i class="bi bi-clock-history" style="color:#FF5200"></i> Order History
    </h4>
    <p class="text-muted mb-0 mt-1">Your last 30 days of snack orders</p>
  </div>
</div>

<div class="row g-3 mb-4 animate-fade-up stagger-60">
  <div class="col-6 col-md-3">
    <div class="stat-card" style="border-top:3px solid var(--primary);">
      <div class="stat-value" style="color:var(--primary);" id="stat-total">₹0</div>
      <div class="stat-label">Total Spent</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="stat-card" style="border-top:3px solid var(--success);">
      <div class="stat-value" style="color:var(--success);" id="stat-orders">0</div>
      <div class="stat-label">Total Orders</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="stat-card" style="border-top:3px solid #0ea5e9;">
      <div class="stat-value" style="color:#0ea5e9;" id="stat-snacks">0</div>
      <div class="stat-label">Total Snacks</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="stat-card" style="border-top:3px solid var(--warning);">
      <div class="stat-value" style="color:var(--warning);font-size:1.1rem;" id="stat-fav">-</div>
      <div class="stat-label">Favourite Snack</div>
    </div>
  </div>
</div>

<div class="k-card animate-fade-up stagger-60">
  <div class="k-card-header">
    <i class="bi bi-clock-history"></i> Past Orders
  </div>
  <div id="history-list"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
  async function loadHistory() {
    const res = await fetch(API + '/history/', {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    });
    if (res.status === 401) { window.location.href = '/login/'; return; }
    const data = await res.json();
    const orders = data;
    renderHistory(orders);
    calcStats(orders);
  }

  function calcStats(orders) {
    let totalSpent = 0;
    let totalSnacks = 0;
    const snackCount = {};

    orders.forEach(o => {
      o.items.forEach(i => {
        const sub = i.quantity * parseFloat(i.snack_price);
        totalSpent += sub;
        totalSnacks += i.quantity;
        snackCount[i.snack_name] =
          (snackCount[i.snack_name] || 0) + i.quantity;
      });
    });

    const fav = Object.entries(snackCount)
      .sort((a, b) => b[1] - a[1])[0];

    document.getElementById('stat-total').textContent = '₹' + totalSpent.toFixed(2);
    document.getElementById('stat-orders').textContent = orders.length;
    document.getElementById('stat-snacks').textContent = totalSnacks;
    document.getElementById('stat-fav').textContent = fav ? fav[0].split(' ')[0] : '-';
  }

  function renderHistory(orders) {
    const list = document.getElementById('history-list');

    if (orders.length === 0) {
      list.innerHTML = `
        <div class="text-center py-5" style="color:var(--text-muted);">
          <i class="bi bi-inbox" style="font-size:2.5rem;"></i>
          <p class="mt-3 mb-0">No orders yet</p>
        </div>`;
      return;
    }

    const sorted = orders.sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 20);

    list.innerHTML = sorted.map((o, i) => {
      const dateObj = new Date(o.date);
      const dateStr = dateObj.toLocaleDateString('en-IN', {
        weekday: 'short', day: 'numeric',
        month: 'short', year: 'numeric'
      });

      return `
        <div class="animate-fade-up" style="animation-delay:${i * 0.05}s;opacity:0;
          border-bottom:1px solid rgba(0,0,0,0.05);">
          <div class="k-list-item d-flex align-items-center
            justify-content-between" style="cursor:pointer;"
            onclick="this.nextElementSibling.classList.toggle('d-none')">
            <div class="d-flex align-items-center gap-3">
              <div style="width:44px;height:44px;
                background:linear-gradient(135deg,var(--primary),var(--primary-dark));
                border-radius:14px;display:flex;align-items:center;
                justify-content:center;flex-shrink:0;">
                <i class="bi bi-bag-check-fill text-white"></i>
              </div>
              <div>
                <div style="font-weight:600;color:var(--dark);">${dateStr}</div>
                <div style="font-size:0.82rem;color:var(--text-muted);">
                  ${o.items.length} snack types
                </div>
              </div>
            </div>
            <div class="d-flex align-items-center gap-3">
              <div style="font-weight:700;color:var(--primary);">
                ₹${o.total.toFixed(2)}
              </div>
              <i class="bi bi-chevron-down" style="color:var(--text-muted);"></i>
            </div>
          </div>
          <div class="d-none px-4 pb-3" style="background:#fafbff;">
            ${o.items.map(i => `
              <div class="d-flex justify-content-between align-items-center py-2"
                style="border-bottom:1px solid rgba(0,0,0,0.04);">
                <div class="d-flex align-items-center gap-2">
                 <img src="${i.snack_image_url || '/static/default.png'}"
                 style="width:32px;height:32px;border-radius:10px;object-fit:cover;" loading="lazy">
                  <span style="color:var(--text-muted);">${i.snack_name}</span>
                </div>
                <div>
                  <span style="font-weight:600;">× ${i.quantity}</span>
                  <span style="color:var(--text-muted);margin-left:8px;">
                    ₹${(i.quantity * parseFloat(i.snack_price)).toFixed(2)}
                  </span>
                </div>
              </div>
            `).join('')}
          </div>
        </div>`;
    }).join('');
  }

  loadHistory();
</script>
{% endblock %}
