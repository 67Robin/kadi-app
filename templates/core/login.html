<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Kadi — Sign In</title>
    <link rel="icon" href="/static/assets/Logooooooooo.png" sizes="16x16 32x32" type="image/png">
    <link rel="apple-touch-icon" href="/static/assets/Logooooooooo.png" sizes="180x180">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display',
                'Segoe UI', Roboto, sans-serif;
            background: #f4f4f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Background decoration */
        body::before {
            content: '';
            position: fixed;
            top: -30%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(252, 128, 25, 0.12), transparent 70%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -20%;
            left: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(255, 77, 77, 0.08), transparent 70%);
            pointer-events: none;
        }

        .login-wrap {
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.5s ease forwards;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 32px;
        }

    .app-icon {
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 18px;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 12px 32px rgba(255, 255, 255, 0); }
      50%       { box-shadow: 0 16px 40px rgba(255, 255, 255, 0); }
    }

        .app-name {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1a1a2e;
        }

        .app-tagline {
            font-size: 0.9rem;
            color: #8a8a9a;
            margin-top: 4px;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 32px 28px;
            box-shadow: 0 8px 40px rgba(108, 99, 255, 0.12);
        }

        .field-wrap {
            margin-bottom: 16px;
        }

        .field-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: #8a8a9a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            display: block;
        }

        .field-input {
            width: 100%;
            background: #f0f2ff;
            border: 1.5px solid transparent;
            border-radius: 12px;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-family: inherit;
            color: #1a1a2e;
            outline: none;
            transition: all 0.2s ease;
        }

        .field-input:focus {
            background: white;
            border-color: #fc8019;
            box-shadow: 0 0 0 4px rgba(252, 128, 25, 0.1);
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #fc8019, #e06c10);
            color: white;
            border: none;
            border-radius: 14px;
            padding: 15px;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 8px;
            box-shadow: 0 6px 20px rgba(252, 128, 25, 0.3);
            letter-spacing: 0.2px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(252, 128, 25, 0.4);
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 28px rgba(108, 99, 255, 0.4);
        }

        .login-btn:active {
            transform: scale(0.98);
        }

        .error-msg {
            background: #fff0f3;
            color: #e94560;
            border-radius: 10px;
            padding: 12px 16px;
            font-size: 0.875rem;
            margin-bottom: 16px;
            display: none;
            animation: shake 0.3s ease;
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-6px);
            }

            75% {
                transform: translateX(6px);
            }
        }

        .divider {
            text-align: center;
            color: #8a8a9a;
            font-size: 0.8rem;
            margin: 20px 0 0;
        }
    </style>
</head>

<body>
    <div class="login-wrap">
        <div class="login-header">
            <div class="app-icon">
        <img src="/static/assets/Logooooooooo.png" alt="Kadi Logo"
          style="width:250px;height:250px;object-fit:contain;">
      </div>
            <div class="app-name">Kadi</div>
            <div class="app-tagline">Fidha Cafe Snack Ledger</div>
        </div>

        <div class="login-card">
            <div class="error-msg" id="error-msg"></div>

            <div class="field-wrap">
                <label class="field-label">Email</label>
                <input type="email" id="email" class="field-input" placeholder="your@email.com" autocomplete="email">
            </div>

            <div class="field-wrap">
                <label class="field-label">Password</label>
                <input type="password" id="password" class="field-input" placeholder="Enter your password"
                    autocomplete="current-password">
            </div>

            <button class="login-btn" onclick="doLogin()" id="login-btn">
                Sign In
            </button>

            <div class="divider">Kadi App v1.0</div>
        </div>
    </div>

    <script>
        const API = window.location.origin + '/api';

        async function doLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errEl = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            if (!email || !password) {
                showError('Please enter your email and password.');
                return;
            }

            btn.textContent = 'Signing in...';
            btn.style.opacity = '0.8';

            const res = await fetch(API + '/auth/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (res.ok) {
                const data = await res.json();
                localStorage.setItem('access_token', data.access);
                localStorage.setItem('refresh_token', data.refresh);

                const profileRes = await fetch(API + '/users/me/', {
                    headers: { 'Authorization': 'Bearer ' + data.access }
                });

                if (profileRes.ok) {
                    const profile = await profileRes.json();
                    localStorage.setItem('user_name', profile.name);
                    localStorage.setItem('user_role', profile.role);
                }

                btn.textContent = '✓ Success!';
                btn.style.background = 'linear-gradient(135deg, #43d39e, #1a9e6e)';

                setTimeout(() => {
                    window.location.href = '/dashboard/';
                }, 500);

            } else {
                btn.textContent = 'Sign In';
                btn.style.opacity = '1';
                showError('Incorrect email or password.');
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        document.addEventListener('keypress', e => {
            if (e.key === 'Enter') doLogin();
        });
    </script>
</body>

</html>
