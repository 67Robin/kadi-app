{% extends 'core/base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-start mb-4 flex-wrap gap-3 animate-fade-up stagger-1">
  <div class="col">
    <h4 class="fw-bold mb-0" style="color:#1a1a2e">
      <i class="bi bi-bar-chart-fill" style="color:#FF5200"></i> Monthly Report
    </h4>
    <p class="text-muted mb-0 mt-1">Snack consumption and billing summary</p>
  </div>

  <div class="d-flex gap-2 flex-wrap align-items-center">
    <select id="month-select" class="k-select" style="width:auto;">
      <option value="1">January</option>
      <option value="2">February</option>
      <option value="3">March</option>
      <option value="4">April</option>
      <option value="5">May</option>
      <option value="6">June</option>
      <option value="7">July</option>
      <option value="8">August</option>
      <option value="9">September</option>
      <option value="10">October</option>
      <option value="11">November</option>
      <option value="12">December</option>
    </select>
    <select id="year-select" class="k-select" style="width:auto;">
      <option value="2026">2026</option>
      <option value="2025">2025</option>
    </select>
    <button class="k-btn k-btn-primary" onclick="loadReport()">
      <i class="bi bi-search"></i> View
    </button>
  </div>
</div>

<div class="row g-3 mb-4 animate-fade-up stagger-2">
  <div class="col-6 col-md-3">
    <div class="stat-card" style="border-top:3px solid var(--primary);">
      <div class="stat-value" style="color:var(--primary);" id="stat-total">₹0</div>
      <div class="stat-label">Total Amount</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="stat-card" style="border-top:3px solid var(--success);">
      <div class="stat-value" style="color:var(--success);" id="stat-items">0</div>
      <div class="stat-label">Total Snacks</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="stat-card" style="border-top:3px solid #0ea5e9;">
      <div class="stat-value" style="color:#0ea5e9;" id="stat-people">0</div>
      <div class="stat-label">People</div>
    </div>
  </div>
  <div class="col-6 col-md-3">
    <div class="stat-card" style="border-top:3px solid var(--warning);">
      <div class="stat-value" style="color:var(--warning);" id="stat-days">0</div>
      <div class="stat-label">Days Active</div>
    </div>
  </div>
</div>

<div class="k-card animate-fade-up stagger-3">
  <div class="k-card-header d-flex justify-content-between align-items-center">
    <span><i class="bi bi-people-fill"></i> Per Person Summary</span>
    <button class="k-btn k-btn-danger" style="padding:6px 14px;font-size:0.8rem;"
      onclick="exportCSV()">
      <i class="bi bi-download"></i> Export CSV
    </button>
  </div>
  <div id="report-list"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
  // Check if user is admin
  if (localStorage.getItem('user_role') !== 'admin') {
    window.location.href = '/dashboard/';
  }
  const now = new Date();
  document.getElementById('month-select').value = now.getMonth() + 1;
  document.getElementById('year-select').value  = now.getFullYear();

  let reportData = [];

  async function loadReport() {
    const month = document.getElementById('month-select').value;
    const year  = document.getElementById('year-select').value;

    document.getElementById('report-list').innerHTML = `
      <div class="text-center py-5">
        <div class="k-spinner mx-auto"></div>
      </div>`;

    const usersRes = await fetch(API + '/users/', {
      headers: { 'Authorization': 'Bearer ' + getToken() }
    });
    const users = await usersRes.json();

    let allReports = [];

    for (const user of users) {
      const res = await fetch(
        API + `/reports/monthly/${year}/${month}/?user_id=${user.id}`,
        { headers: { 'Authorization': 'Bearer ' + getToken() } }
      );
      if (res.ok) {
        const data = await res.json();
        if (data.items && data.items.length > 0) {
          allReports.push(data);
        }
      }
    }

    reportData = allReports;
    renderReport(allReports);
  }

  function renderReport(reports) {
    const list = document.getElementById('report-list');

    if (reports.length === 0) {
      list.innerHTML = `
        <div class="text-center py-5" style="color:var(--text-muted);">
          <i class="bi bi-inbox" style="font-size:2.5rem;"></i>
          <p class="mt-3 mb-0">No orders found for this month</p>
        </div>`;
      return;
    }

    let grandTotal = 0;
    let grandItems = 0;

    list.innerHTML = reports.map((r, i) => {
      grandTotal += r.total;
      grandItems += r.items.reduce((a, i) => a + i.total_qty, 0);

      return `
        <div class="animate-fade-up" style="animation-delay:${i*0.05}s;opacity:0;
          border-bottom:1px solid rgba(0,0,0,0.05);">
          <div class="k-list-item d-flex justify-content-between align-items-center"
            style="cursor:pointer;"
            onclick="this.nextElementSibling.classList.toggle('d-none')">
            <div class="d-flex align-items-center gap-3">
              <div class="k-avatar">
                ${r.user.charAt(0).toUpperCase()}
              </div>
              <div>
                <div style="font-weight:600;color:var(--dark);">${r.user}</div>
                <div style="font-size:0.82rem;color:var(--text-muted);">
                  ${r.items.length} snack types
                </div>
              </div>
            </div>
            <div class="d-flex align-items-center gap-3">
              <div style="font-weight:700;font-size:1.1rem;color:var(--primary);">
                ₹${r.total.toFixed(2)}
              </div>
              <i class="bi bi-chevron-down" style="color:var(--text-muted);"></i>
            </div>
          </div>
          <div class="d-none px-4 pb-3" style="background:#fafbff;">
            ${r.items.map(item => `
              <div class="d-flex justify-content-between py-2"
                style="border-bottom:1px solid rgba(0,0,0,0.04);">
                <span style="color:var(--text-muted);">${item.snack__name}</span>
                <span style="font-weight:500;">
                  × ${item.total_qty}
                  <span style="color:var(--text-muted);margin-left:8px;">
                    ₹${(item.total_qty * parseFloat(item.snack__price)).toFixed(2)}
                  </span>
                </span>
              </div>
            `).join('')}
          </div>
        </div>`;
    }).join('');

    list.innerHTML += `
      <div class="d-flex justify-content-between align-items-center px-4 py-3"
        style="background:var(--gray);border-radius:0 0 20px 20px;">
        <span style="font-weight:700;color:var(--dark);">Grand Total</span>
        <span style="font-weight:700;font-size:1.2rem;color:var(--primary);">
          ₹${grandTotal.toFixed(2)}
        </span>
      </div>`;

    document.getElementById('stat-total').textContent  = '₹' + grandTotal.toFixed(2);
    document.getElementById('stat-items').textContent  = grandItems;
    document.getElementById('stat-people').textContent = reports.length;
  }

  function exportCSV() {
    if (reportData.length === 0) {
      alert('No data to export');
      return;
    }
    let csv = 'User,Snack,Quantity,Amount\n';
    reportData.forEach(r => {
      r.items.forEach(i => {
        csv += `${r.user},${i.snack__name},${i.total_qty},${(i.total_qty * parseFloat(i.snack__price)).toFixed(2)}\n`;
      });
    });
    const blob = new Blob([csv], { type: 'text/csv' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'kadi_report.csv';
    a.click();
  }

  loadReport();
</script>
{% endblock %}
